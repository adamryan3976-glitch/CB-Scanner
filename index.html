<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CB Tracker | Winchester P.S.</title>
    
    <!-- App Icons -->
    <link rel="icon" type="image/png" href="ScannerAppLogo.png">
    <link rel="apple-touch-icon" href="ScannerAppLogo.png">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Barcode Scanner Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    
    <style>
        #interactive.viewport {
            position: relative;
            width: 100%;
            height: 300px;
            overflow: hidden;
            border-radius: 1rem;
            background: #000;
        }
        #interactive.viewport > canvas, #interactive.viewport > video {
            float: left;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        canvas.drawingBuffer {
            display: none;
        }
        /* Guided Scanning UI */
        .scan-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            height: 30%;
            border: 2px solid rgba(59, 130, 246, 0.8);
            border-radius: 12px;
            box-shadow: 0 0 0 2000px rgba(0,0,0,0.6);
            pointer-events: none;
            z-index: 20;
        }
        .scan-line {
            position: absolute;
            top: 50%;
            left: 10%;
            width: 80%;
            height: 2px;
            background: #ef4444;
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.8);
            animation: scan 2s ease-in-out infinite;
            z-index: 21;
        }
        @keyframes scan {
            0%, 100% { transform: translateY(-40px); opacity: 0.2; }
            50% { transform: translateY(40px); opacity: 1; }
        }
        .loading-shimmer {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 p-3 shadow-sm sticky top-0 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="ScannerAppLogo.png" alt="Logo" class="w-10 h-10 object-contain rounded-lg shadow-sm">
                <div>
                    <h1 class="text-lg font-black tracking-tight text-slate-800 leading-none">CB TRACKER</h1>
                    <p class="text-[10px] text-blue-600 font-bold uppercase tracking-widest">Winchester P.S.</p>
                </div>
            </div>
            <span id="status-indicator" class="w-3 h-3 bg-slate-400 rounded-full border-2 border-white shadow-sm"></span>
        </div>
    </header>

    <main class="flex-grow p-4 max-w-md mx-auto w-full space-y-4">
        
        <!-- Mode Toggle -->
        <div class="bg-slate-200/50 rounded-2xl p-1 flex border border-slate-200">
            <button onclick="setMode('OUT')" id="btn-out" class="flex-1 py-3 rounded-xl font-bold transition-all bg-blue-600 text-white shadow-md">
                Check Out
            </button>
            <button onclick="setMode('IN')" id="btn-in" class="flex-1 py-3 rounded-xl font-bold transition-all text-slate-500">
                Check In
            </button>
        </div>

        <!-- Scanner Section -->
        <div id="scanner-container" class="bg-white rounded-2xl p-4 shadow-sm border border-slate-200">
            <div class="flex justify-between items-center mb-3">
                <div class="flex flex-col">
                    <h2 class="font-bold text-slate-700 uppercase text-xs tracking-wider">Step 1: Scan Device</h2>
                    <p id="scanner-status" class="text-[10px] text-slate-400">Ready to scan</p>
                </div>
                <button onclick="toggleScanner()" id="scanner-toggle" class="text-blue-600 text-xs font-bold px-3 py-1 bg-blue-50 rounded-lg border border-blue-100">Stop Camera</button>
            </div>
            
            <div id="interactive" class="viewport flex items-center justify-center">
                <div id="scanner-placeholder" class="absolute inset-0 z-10 flex flex-col items-center justify-center bg-slate-900 text-white p-6 text-center">
                    <img src="ScannerAppLogo.png" class="w-20 h-20 mb-4 opacity-40 grayscale" alt="App Logo">
                    <p class="text-xs font-medium mb-4 text-slate-400 uppercase tracking-widest">Camera Authorization Required</p>
                    <button onclick="startScanner()" class="bg-blue-600 px-8 py-3 rounded-full font-bold text-sm shadow-xl shadow-blue-500/40">Unlock Camera</button>
                </div>
                <div class="scan-overlay"></div>
                <div class="scan-line"></div>
            </div>
            
            <div class="mt-4">
                <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-widest">Device ID / Barcode</label>
                <div class="flex gap-2">
                    <input type="text" id="barcode-input" class="flex-1 bg-slate-100 border-2 border-transparent rounded-xl px-4 py-3 text-lg font-mono focus:border-blue-500 focus:bg-white transition-all outline-none" placeholder="Scan result...">
                    <button onclick="lookupDevice()" class="bg-slate-800 text-white px-4 rounded-xl active:scale-95 transition-transform">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Form Section -->
        <div id="form-container" class="bg-white rounded-2xl p-4 shadow-sm border border-slate-200 space-y-4">
            <h2 class="font-bold text-slate-700 uppercase text-xs tracking-wider">Step 2: Log Details</h2>
            
            <div id="checkout-fields">
                <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-widest">Assignee</label>
                <div class="flex gap-2 mb-3">
                    <select id="assignee-type" onchange="toggleManualName()" class="bg-slate-100 border-none rounded-xl px-3 py-3 text-sm font-bold text-slate-600">
                        <option value="student">Student</option>
                        <option value="teacher">Staff</option>
                        <option value="service">Repair</option>
                    </select>
                    <input type="text" id="assignee-name" class="flex-1 bg-slate-100 border-none rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-blue-500/20" placeholder="Full Name">
                </div>
            </div>

            <div id="checkin-fields" class="hidden bg-blue-50 p-4 rounded-xl border border-blue-100">
                <p class="text-xs font-bold text-blue-400 uppercase tracking-widest mb-1">Current Record</p>
                <p class="text-sm text-blue-900 font-medium" id="current-holder-info">Scan a barcode to verify owner...</p>
            </div>

            <div>
                <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-widest">Comments</label>
                <textarea id="notes" rows="2" class="w-full bg-slate-100 border-none rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-blue-500/20" placeholder="Condition, items included..."></textarea>
            </div>

            <button onclick="submitRecord()" id="submit-btn" class="w-full bg-slate-900 hover:bg-black text-white font-black py-4 rounded-2xl shadow-lg transition-all flex justify-center items-center gap-2 uppercase tracking-tighter">
                Confirm Transaction
            </button>
        </div>

    </main>

    <!-- Success Modal -->
    <div id="success-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm hidden items-center justify-center p-6 z-[100]">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-sm text-center shadow-2xl">
            <div class="w-24 h-24 bg-green-50 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-14 h-14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h3 class="text-3xl font-black text-slate-800 mb-2 italic">LOGGED!</h3>
            <p class="text-slate-500 text-sm mb-8 font-medium">Google Sheet has been updated successfully.</p>
            <button onclick="closeModal()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-lg shadow-xl shadow-blue-500/30 active:scale-95 transition-all">NEXT SCAN</button>
        </div>
    </div>

    <!-- Error Toast -->
    <div id="error-toast" class="fixed bottom-6 left-6 right-6 bg-red-600 text-white p-4 rounded-2xl shadow-2xl hidden transition-all z-[110] flex items-center gap-3">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <p id="error-msg" class="text-xs font-bold uppercase tracking-tight"></p>
    </div>

    <script>
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbweviiSxRolAvZ-ySkcDjQKx7uJLlGN0EBw6mzSc86GXX7T8FREE5zP-C5gL-IwmbKRwQ/exec"; 

        let currentMode = 'OUT';
        let scannerRunning = false;
        let scanTimeout;

        function setMode(mode) {
            currentMode = mode;
            const btnOut = document.getElementById('btn-out');
            const btnIn = document.getElementById('btn-in');
            const checkoutFields = document.getElementById('checkout-fields');
            const checkinFields = document.getElementById('checkin-fields');
            
            if (mode === 'OUT') {
                btnOut.className = 'flex-1 py-3 rounded-xl font-bold transition-all bg-blue-600 text-white shadow-md';
                btnIn.className = 'flex-1 py-3 rounded-xl font-bold transition-all text-slate-500';
                checkoutFields.classList.remove('hidden');
                checkinFields.classList.add('hidden');
            } else {
                btnIn.className = 'flex-1 py-3 rounded-xl font-bold transition-all bg-blue-600 text-white shadow-md';
                btnOut.className = 'flex-1 py-3 rounded-xl font-bold transition-all text-slate-500';
                checkoutFields.classList.add('hidden');
                checkinFields.classList.remove('hidden');
            }
        }

        function toggleManualName() {
            const type = document.getElementById('assignee-type').value;
            const nameInput = document.getElementById('assignee-name');
            if (type === 'service') {
                nameInput.value = "Maintenance Dept";
                nameInput.disabled = true;
                nameInput.classList.add('opacity-50');
            } else {
                nameInput.value = "";
                nameInput.disabled = false;
                nameInput.classList.remove('opacity-50');
            }
        }

        async function startScanner(retryCount = 0) {
            const statusLabel = document.getElementById('scanner-status');
            const placeholder = document.getElementById('scanner-placeholder');
            statusLabel.innerText = "Initializing High-Speed Scanner...";
            placeholder.classList.add('loading-shimmer');

            const constraints = {
                facingMode: "environment",
                width: { ideal: 640 },
                height: { ideal: 480 },
                frameRate: { ideal: 30, min: 20 }
            };

            Quagga.init({
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: document.querySelector('#interactive'),
                    constraints: constraints,
                    async: true
                },
                locator: {
                    patchSize: "medium",
                    halfSample: true
                },
                numOfWorkers: navigator.hardwareConcurrency || 4,
                decoder: {
                    readers: ["code_128_reader", "code_39_reader"],
                    multiple: false
                },
                locate: true,
                frequency: 10
            }, function(err) {
                if (err) {
                    if (retryCount < 2) {
                        setTimeout(() => startScanner(retryCount + 1), 1000);
                        return;
                    }
                    statusLabel.innerText = "Camera failed.";
                    placeholder.classList.remove('loading-shimmer');
                    showError("Could not start camera.");
                    return;
                }
                
                placeholder.classList.add('hidden');
                Quagga.start();
                scannerRunning = true;
                statusLabel.innerText = "Scanner Ready";
                document.getElementById('scanner-toggle').innerText = "Stop Camera";
                document.getElementById('status-indicator').classList.replace('bg-slate-400', 'bg-green-400');
            });

            if (retryCount === 0) {
                Quagga.onDetected((data) => {
                    const code = data.codeResult.code;
                    if (!code) return;
                    
                    document.getElementById('barcode-input').value = code;
                    if (window.navigator.vibrate) window.navigator.vibrate(100);
                    
                    document.getElementById('barcode-input').classList.add('ring-4', 'ring-green-400');
                    
                    clearTimeout(scanTimeout);
                    scanTimeout = setTimeout(() => {
                        document.getElementById('barcode-input').classList.remove('ring-4', 'ring-green-400');
                        if (currentMode === 'IN') lookupDevice();
                    }, 800);
                });
            }
        }

        function toggleScanner() {
            const placeholder = document.getElementById('scanner-placeholder');
            if (scannerRunning) {
                Quagga.stop();
                scannerRunning = false;
                document.getElementById('scanner-toggle').innerText = "Start Camera";
                document.getElementById('scanner-status').innerText = "Camera Stopped";
                document.getElementById('status-indicator').classList.replace('bg-green-400', 'bg-slate-400');
                placeholder.classList.remove('hidden');
            } else {
                startScanner();
            }
        }

        async function lookupDevice() {
            const barcode = document.getElementById('barcode-input').value;
            if (!barcode) return;
            document.getElementById('current-holder-info').innerText = "Fetching owner details...";
            try {
                const response = await fetch(`${APPS_SCRIPT_URL}?action=lookup&barcode=${barcode}`);
                const data = await response.json();
                if (data.found) {
                    document.getElementById('current-holder-info').innerHTML = `
                        <span class="block text-blue-950 font-black text-lg">${data.name}</span>
                        <span class="text-[10px] opacity-60">Out since ${data.date}</span>
                    `;
                } else {
                    document.getElementById('current-holder-info').innerText = "Device not currently checked out.";
                }
            } catch (e) {
                document.getElementById('current-holder-info').innerText = "Lookup error. Try manual sync.";
            }
        }

        async function submitRecord() {
            const barcode = document.getElementById('barcode-input').value;
            if (!barcode) {
                showError("Scan a device barcode first");
                return;
            }
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = '<svg class="animate-spin h-5 w-5 mr-3 border-t-2 border-white rounded-full" viewBox="0 0 24 24"></svg> UPDATING CLOUD...';
            const payload = {
                action: 'save',
                mode: currentMode,
                barcode: barcode,
                name: document.getElementById('assignee-name').value || (currentMode === 'IN' ? "Returned" : "Unknown"),
                type: document.getElementById('assignee-type').value,
                notes: document.getElementById('notes').value,
                timestamp: new Date().toISOString()
            };
            try {
                await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload),
                    headers: { 'Content-Type': 'application/json' }
                });
                showSuccess();
            } catch (e) {
                showError("Sync failed. Check connection.");
                btn.disabled = false;
                btn.innerText = "Confirm Transaction";
            }
        }

        function showSuccess() {
            document.getElementById('success-modal').style.display = 'flex';
            resetForm();
        }

        function closeModal() {
            document.getElementById('success-modal').style.display = 'none';
        }

        function showError(msg) {
            const toast = document.getElementById('error-toast');
            document.getElementById('error-msg').innerText = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 4000);
        }

        function resetForm() {
            document.getElementById('barcode-input').value = "";
            document.getElementById('assignee-name').value = "";
            document.getElementById('notes').value = "";
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('submit-btn').innerText = "Confirm Transaction";
            document.getElementById('current-holder-info').innerText = "Scan a barcode to verify owner...";
        }
    </script>
</body>
</html>
