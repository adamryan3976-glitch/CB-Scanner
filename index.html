<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChromeCheck | School Tech Manager</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Barcode Scanner Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <!-- App Icons -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232563eb'/><path d='M30 30h40v30H30zM25 65h50v5H25z' fill='white'/></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232563eb'/><path d='M30 30h40v30H30zM25 65h50v5H25z' fill='white'/></svg>">
    
    <style>
        #interactive.viewport {
            position: relative;
            width: 100%;
            height: 300px;
            overflow: hidden;
            border-radius: 1rem;
            background: #000;
        }
        #interactive.viewport > canvas, #interactive.viewport > video {
            float: left;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        canvas.drawingBuffer {
            display: none;
        }
        /* Guided Scanning UI */
        .scan-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            height: 30%;
            border: 2px solid rgba(59, 130, 246, 0.8);
            border-radius: 12px;
            box-shadow: 0 0 0 2000px rgba(0,0,0,0.6);
            pointer-events: none;
            z-index: 20;
        }
        .scan-line {
            position: absolute;
            top: 50%;
            left: 10%;
            width: 80%;
            height: 2px;
            background: #ef4444;
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.8);
            animation: scan 2s ease-in-out infinite;
            z-index: 21;
        }
        @keyframes scan {
            0%, 100% { transform: translateY(-40px); opacity: 0.2; }
            50% { transform: translateY(40px); opacity: 1; }
        }
        .loading-shimmer {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2-2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg>
                ChromeCheck
            </h1>
            <span id="status-indicator" class="w-3 h-3 bg-slate-400 rounded-full border border-white/20"></span>
        </div>
    </header>

    <main class="flex-grow p-4 max-w-md mx-auto w-full space-y-4">
        
        <!-- Mode Toggle -->
        <div class="bg-white rounded-2xl p-1 shadow-sm flex border border-slate-200">
            <button onclick="setMode('OUT')" id="btn-out" class="flex-1 py-3 rounded-xl font-semibold transition-all bg-blue-600 text-white shadow-md">
                Check Out
            </button>
            <button onclick="setMode('IN')" id="btn-in" class="flex-1 py-3 rounded-xl font-semibold transition-all text-slate-500">
                Check In
            </button>
        </div>

        <!-- Scanner Section -->
        <div id="scanner-container" class="bg-white rounded-2xl p-4 shadow-sm border border-slate-200">
            <div class="flex justify-between items-center mb-3">
                <div class="flex flex-col">
                    <h2 class="font-bold text-slate-700 uppercase text-xs tracking-wider">Step 1: Scan Barcode</h2>
                    <p id="scanner-status" class="text-[10px] text-slate-400">Waiting for user interaction...</p>
                </div>
                <button onclick="toggleScanner()" id="scanner-toggle" class="text-blue-600 text-sm font-medium px-3 py-1 bg-blue-50 rounded-lg">Stop Camera</button>
            </div>
            
            <div id="interactive" class="viewport flex items-center justify-center">
                <div id="scanner-placeholder" class="absolute inset-0 z-10 flex flex-col items-center justify-center bg-slate-900 text-white p-6 text-center">
                    <svg class="w-12 h-12 mb-3 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <p class="text-sm mb-4">Fast scanner optimized</p>
                    <button onclick="startScanner()" class="bg-blue-600 px-6 py-3 rounded-full font-bold text-sm shadow-lg shadow-blue-500/50">Unlock Camera</button>
                </div>
                <div class="scan-overlay"></div>
                <div class="scan-line"></div>
            </div>
            
            <div class="mt-4">
                <label class="block text-xs font-semibold text-slate-500 mb-1">SERIAL / BARCODE</label>
                <div class="flex gap-2">
                    <input type="text" id="barcode-input" class="flex-1 bg-slate-100 border-none rounded-lg px-4 py-3 text-lg font-mono focus:ring-2 focus:ring-blue-500" placeholder="Waiting for scan...">
                    <button onclick="lookupDevice()" class="bg-slate-800 text-white px-4 rounded-lg">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Form Section -->
        <div id="form-container" class="bg-white rounded-2xl p-4 shadow-sm border border-slate-200 space-y-4">
            <h2 class="font-bold text-slate-700 uppercase text-xs tracking-wider">Step 2: Assign Details</h2>
            
            <div id="checkout-fields">
                <label class="block text-xs font-semibold text-slate-500 mb-1">ASSIGN TO</label>
                <select id="assignee-type" onchange="toggleManualName()" class="w-full bg-slate-100 border-none rounded-lg px-4 py-3 mb-3">
                    <option value="student">Student</option>
                    <option value="teacher">Teacher</option>
                    <option value="service">Out for Service</option>
                </select>
                <input type="text" id="assignee-name" class="w-full bg-slate-100 border-none rounded-lg px-4 py-3" placeholder="Full Name">
            </div>

            <div id="checkin-fields" class="hidden bg-blue-50 p-3 rounded-lg border border-blue-100">
                <p class="text-sm text-blue-800" id="current-holder-info">Scanning for existing record...</p>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1">NOTES</label>
                <textarea id="notes" rows="2" class="w-full bg-slate-100 border-none rounded-lg px-4 py-3" placeholder="Condition, charger included, etc..."></textarea>
            </div>

            <button onclick="submitRecord()" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-200 transition-all flex justify-center items-center gap-2">
                Save Record
            </button>
        </div>

    </main>

    <!-- Success Modal -->
    <div id="success-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-6 z-[100]">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm text-center">
            <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h3 class="text-2xl font-bold mb-2">Success!</h3>
            <p class="text-slate-500 mb-6">The Google Sheet has been updated successfully.</p>
            <button onclick="closeModal()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold">Done</button>
        </div>
    </div>

    <!-- Error Toast -->
    <div id="error-toast" class="fixed bottom-4 left-4 right-4 bg-red-600 text-white p-4 rounded-xl shadow-2xl hidden transition-all z-[110]">
        <p id="error-msg"></p>
    </div>

    <script>
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbweviiSxRolAvZ-ySkcDjQKx7uJLlGN0EBw6mzSc86GXX7T8FREE5zP-C5gL-IwmbKRwQ/exec"; 

        let currentMode = 'OUT';
        let scannerRunning = false;
        let scanTimeout;

        function setMode(mode) {
            currentMode = mode;
            const btnOut = document.getElementById('btn-out');
            const btnIn = document.getElementById('btn-in');
            const checkoutFields = document.getElementById('checkout-fields');
            const checkinFields = document.getElementById('checkin-fields');
            
            if (mode === 'OUT') {
                btnOut.className = 'flex-1 py-3 rounded-xl font-semibold transition-all bg-blue-600 text-white shadow-md';
                btnIn.className = 'flex-1 py-3 rounded-xl font-semibold transition-all text-slate-500';
                checkoutFields.classList.remove('hidden');
                checkinFields.classList.add('hidden');
            } else {
                btnIn.className = 'flex-1 py-3 rounded-xl font-semibold transition-all bg-blue-600 text-white shadow-md';
                btnOut.className = 'flex-1 py-3 rounded-xl font-semibold transition-all text-slate-500';
                checkoutFields.classList.add('hidden');
                checkinFields.classList.remove('hidden');
            }
        }

        function toggleManualName() {
            const type = document.getElementById('assignee-type').value;
            const nameInput = document.getElementById('assignee-name');
            if (type === 'service') {
                nameInput.value = "Maintenance Dept";
                nameInput.disabled = true;
                nameInput.classList.add('opacity-50');
            } else {
                nameInput.value = "";
                nameInput.disabled = false;
                nameInput.classList.remove('opacity-50');
            }
        }

        // SPEED OPTIMIZED SCANNER LOGIC
        async function startScanner(retryCount = 0) {
            const statusLabel = document.getElementById('scanner-status');
            const placeholder = document.getElementById('scanner-placeholder');
            
            statusLabel.innerText = "Initializing High-Speed Scanner...";
            placeholder.classList.add('loading-shimmer');

            // Using ideal constraints for performance
            const constraints = {
                facingMode: "environment",
                width: { ideal: 640 }, // Lower resolution = much faster processing
                height: { ideal: 480 },
                frameRate: { ideal: 30, min: 20 }
            };

            Quagga.init({
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: document.querySelector('#interactive'),
                    constraints: constraints,
                    async: true
                },
                locator: {
                    patchSize: "medium", // Medium is faster than large for barcodes
                    halfSample: true    // Speed optimization: scale image down for location
                },
                numOfWorkers: navigator.hardwareConcurrency || 4, // Use multiple CPU cores
                decoder: {
                    // Limit readers to only what's likely used (faster than searching for all types)
                    readers: ["code_128_reader", "code_39_reader"],
                    multiple: false
                },
                locate: true,
                frequency: 10 // Max 10 scans per second to prevent CPU lag
            }, function(err) {
                if (err) {
                    if (retryCount < 2) {
                        setTimeout(() => startScanner(retryCount + 1), 1000);
                        return;
                    }
                    statusLabel.innerText = "Camera failed.";
                    placeholder.classList.remove('loading-shimmer');
                    showError("Could not start camera.");
                    return;
                }
                
                placeholder.classList.add('hidden');
                Quagga.start();
                scannerRunning = true;
                statusLabel.innerText = "High-Speed Scanner Active";
                document.getElementById('scanner-toggle').innerText = "Stop Camera";
                document.getElementById('status-indicator').classList.replace('bg-slate-400', 'bg-green-400');
            });

            if (retryCount === 0) {
                Quagga.onDetected((data) => {
                    const code = data.codeResult.code;
                    if (!code) return;
                    
                    document.getElementById('barcode-input').value = code;
                    if (window.navigator.vibrate) window.navigator.vibrate(100);
                    
                    document.getElementById('barcode-input').classList.add('ring-4', 'ring-green-400');
                    
                    clearTimeout(scanTimeout);
                    scanTimeout = setTimeout(() => {
                        document.getElementById('barcode-input').classList.remove('ring-4', 'ring-green-400');
                        if (currentMode === 'IN') lookupDevice();
                    }, 800);
                });
            }
        }

        function toggleScanner() {
            const placeholder = document.getElementById('scanner-placeholder');
            if (scannerRunning) {
                Quagga.stop();
                scannerRunning = false;
                document.getElementById('scanner-toggle').innerText = "Start Camera";
                document.getElementById('scanner-status').innerText = "Camera Stopped";
                document.getElementById('status-indicator').classList.replace('bg-green-400', 'bg-slate-400');
                placeholder.classList.remove('hidden');
            } else {
                startScanner();
            }
        }

        async function lookupDevice() {
            const barcode = document.getElementById('barcode-input').value;
            if (!barcode) return;
            document.getElementById('current-holder-info').innerText = "Searching records...";
            try {
                const response = await fetch(`${APPS_SCRIPT_URL}?action=lookup&barcode=${barcode}`);
                const data = await response.json();
                if (data.found) {
                    document.getElementById('current-holder-info').innerHTML = `
                        <strong>Currently with:</strong> ${data.name}<br>
                        <strong>Date:</strong> ${data.date}
                    `;
                } else {
                    document.getElementById('current-holder-info').innerText = "No active checkout found for this device.";
                }
            } catch (e) {
                document.getElementById('current-holder-info').innerText = "Error connecting to Google Sheet.";
            }
        }

        async function submitRecord() {
            const barcode = document.getElementById('barcode-input').value;
            if (!barcode) {
                showError("Please scan a device first");
                return;
            }
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = '<svg class="animate-spin h-5 w-5 mr-3 border-t-2 border-white rounded-full" viewBox="0 0 24 24"></svg> Saving...';
            const payload = {
                action: 'save',
                mode: currentMode,
                barcode: barcode,
                name: document.getElementById('assignee-name').value || (currentMode === 'IN' ? "Returned" : "Unknown"),
                type: document.getElementById('assignee-type').value,
                notes: document.getElementById('notes').value,
                timestamp: new Date().toISOString()
            };
            try {
                await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload),
                    headers: { 'Content-Type': 'application/json' }
                });
                showSuccess();
            } catch (e) {
                showError("Failed to save. Check your Apps Script deployment.");
                btn.disabled = false;
                btn.innerText = "Save Record";
            }
        }

        function showSuccess() {
            document.getElementById('success-modal').style.display = 'flex';
            resetForm();
        }

        function closeModal() {
            document.getElementById('success-modal').style.display = 'none';
        }

        function showError(msg) {
            const toast = document.getElementById('error-toast');
            document.getElementById('error-msg').innerText = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 4000);
        }

        function resetForm() {
            document.getElementById('barcode-input').value = "";
            document.getElementById('assignee-name').value = "";
            document.getElementById('notes').value = "";
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('submit-btn').innerText = "Save Record";
        }
    </script>
</body>
</html>
